apiVersion: v1
kind: Namespace
metadata:
  name: tap-system
  labels:
    name: tap-system
---
apiVersion: v1
kind: Secret
metadata:
  name: tap-secrets
  namespace: tap-system
type: Opaque
stringData:
  database-url: "postgresql://tap-user:secure-password@postgres:5432/trading_advisor"
  redis-url: "redis://redis:6379/0"
  api-key: "your-secure-api-key-here"
  db-user: "tap-user"
  db-password: "secure-password"
  jwt-secret: "your-jwt-secret-here"
  encryption-key: "your-encryption-key-here"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tap-config
  namespace: tap-system
data:
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"
  MAX_CONNECTIONS: "100"
  TIMEOUT_SECONDS: "30"
  RATE_LIMIT_PER_MINUTE: "1000"
  ENABLE_METRICS: "true"
  ENABLE_TRACING: "true"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: tap-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: tap-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tap-models-pvc
  namespace: tap-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tap-data-pvc
  namespace: tap-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 200Gi
  storageClassName: standard
