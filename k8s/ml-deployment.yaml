apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-advisor-pro-ml
  namespace: tap-system
  labels:
    app: tap-ml
    version: v7.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tap-ml
  template:
    metadata:
      labels:
        app: tap-ml
        version: v7.0
    spec:
      containers:
      - name: ml-predictor
        image: trading-advisor-pro/ml:v7.0
        ports:
        - containerPort: 8002
        env:
        - name: MODEL_PATH
          value: /models
        - name: GPU_ENABLED
          value: "true"
        resources:
          requests:
            memory: "4Gi"
            cpu: "1000m"
            nvidia.com/gpu: "1"
          limits:
            memory: "8Gi"
            cpu: "2000m"
            nvidia.com/gpu: "1"
        volumeMounts:
        - name: models
          mountPath: /models
        - name: data
          mountPath: /data
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: tap-models-pvc
      - name: data
        persistentVolumeClaim:
          claimName: tap-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: tap-ml-service
  namespace: tap-system
spec:
  selector:
    app: tap-ml
  ports:
  - name: http
    port: 8002
    targetPort: 8002
  type: ClusterIP
