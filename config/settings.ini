# Trading Advisor Pro v6.0 - Enterprise Edition Configuration
# Centralized configuration management with environment support

[general]
app_name = Trading Advisor Pro
version = 6.0.0
environment = production
log_level = INFO
max_workers = 4
timeout_seconds = 30

[data]
default_source = yahoo
cache_enabled = true
cache_ttl_hours = 24
max_history_days = 365
default_currency = USD

[trading]
default_capital = 10000.0
max_position_size_pct = 0.25
max_portfolio_risk = 0.02
stop_loss_default_pct = 0.05
take_profit_default_pct = 0.10
min_confidence_threshold = 0.65

[risk_management]
var_confidence_level = 0.95
cvar_enabled = true
max_drawdown_limit = 0.15
volatility_window = 20
correlation_threshold = 0.7

[machine_learning]
model_cache_enabled = true
retrain_frequency_days = 7
feature_importance_threshold = 0.01
cross_validation_folds = 5

[deep_learning]
default_architecture = hybrid_lstm_transformer
sequence_length = 60
dropout_rate = 0.3
learning_rate = 0.001
batch_size = 32
early_stopping_patience = 10

[quantum]
optimization_iterations = 1000
annealing_schedule = linear
qubit_simulation = true

[sentiment]
news_sources = yahoo,google,reuters
sentiment_model = transformer
language = en
min_articles_for_signal = 5

[database]
type = sqlite
path = ./data/trading.db
backup_enabled = true
backup_frequency_hours = 24

[api]
rate_limit_per_minute = 60
retry_attempts = 3
retry_delay_seconds = 2

[logging]
console_output = true
file_output = true
log_directory = ./logs
rotation_max_mb = 50
backup_count = 10
include_timestamps = true
include_caller_info = true

[security]
encrypt_sensitive_data = true
api_key_rotation_days = 30
audit_logging_enabled = true

[backtesting]
default_start_date = 2020-01-01
default_end_date = 2024-12-31
transaction_cost_pct = 0.001
slippage_pct = 0.0005
benchmark_symbol = SPY

[visualization]
chart_format = png
dpi = 300
interactive_plots = true
color_scheme = professional
